name: Sync TickUp Core

on:
  workflow_dispatch:
  repository_dispatch:

permissions:
  contents: write

jobs:
  sync-core:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            package-lock.json
            example/package-lock.json

      - name: Install latest tickup in root
        run: npm install tickup@latest

      - name: Install latest tickup in example
        run: npm install --prefix example tickup@latest

      - name: Commit and push if changed
        run: |
          if git diff --quiet -- package.json package-lock.json example/package.json example/package-lock.json; then
            echo "No dependency changes detected."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add package.json package-lock.json example/package.json example/package-lock.json
          git commit -m "chore: sync with latest tickup core [skip ci]"
          git push origin main
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
