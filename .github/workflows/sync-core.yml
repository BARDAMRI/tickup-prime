name: Sync TickUp Core

on:
  workflow_dispatch:
  repository_dispatch:
    types: [core_updated]
  push:
    branches: [main]

permissions:
  contents: write

concurrency:
  group: sync-core-main
  cancel-in-progress: false

jobs:
  sync-core:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            package-lock.json
            example/package-lock.json

      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Install latest tickup in root
        run: npm install tickup@latest

      - name: Install dependencies in example
        run: npm install --prefix example

      - name: Bump version
        id: bump
        run: |
          npm version patch --no-git-tag-version
          VERSION="$(node -p "require('./package.json').version")"
          echo "version=${VERSION}" >> "${GITHUB_OUTPUT}"
          echo "New version: ${VERSION}"

      - name: Commit and push if changed
        env:
          EVENT_NAME: ${{ github.event_name }}
          VERSION: ${{ steps.bump.outputs.version }}
        run: |
          git add package.json package-lock.json example/package.json example/package-lock.json

          if git diff --cached --quiet; then
            echo "No changes to commit (unexpected after version bump)."
            exit 0
          fi

          if [ "${EVENT_NAME}" = "push" ]; then
            MSG="chore: automatic version bump to v${VERSION} [skip ci]"
          else
            MSG="chore: sync with core and bump version to v${VERSION} [skip ci]"
          fi

          git commit -m "${MSG}"
          git push origin main

  deploy-showcase:
    needs: sync-core
    runs-on: ubuntu-latest
    steps:
      - name: Checkout latest main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            package-lock.json
            example/package-lock.json

      - name: Install root dependencies cleanly
        run: npm ci

      - name: Install example dependencies cleanly
        run: npm ci --prefix example

      - name: Build Prime library
        run: npm run build

      - name: Build showcase
        run: npm run build --prefix example

      - name: Deploy example to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: ./example/dist
